<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anjali ki River Diaries 🌊</title>
<link rel="icon" href="data:,">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  .splash-container {
    text-align: center;
    animation: popIn 0.8s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .splash-container h1 {
    font-family: 'Baloo 2', sans-serif;
    color: var(--text-dark);
    margin-bottom: 30px;
    font-size: clamp(28px, 6vw, 36px);
  }
</style>
</head>
<body>

<div class="start-overlay" id="startOverlay">
  <div class="splash-container">
    <h1>Anjali ki River Diaries 🌊</h1>
    <button class="btn-primary" id="startBtn" style="font-size: 18px; padding: 16px 32px; box-shadow: 0 15px 25px -10px rgba(255,79,129,0.7);">Tap to Open Diary 🌸</button>
  </div>
</div>

<!-- preload="none" prevents 404 errors if audio.mp3 is missing -->
<audio id="bgMusic" src="audio.mp3" loop preload="none"></audio>

<canvas id="confetti"></canvas>

<div class="page-header">
  <h2>Anjali ki River Diaries 🌊</h2>
  <p>10 pal, 10 vibes — ek dum cute photo journey ✨</p>
</div>

<div class="card">
  <div class="dots" id="dots"></div>

  <div class="page-content" id="pageContent">
    <div class="photo-frame">
      <!-- src set by JS; alt will also be updated by JS -->
      <img id="photo" src="img_10.webp" alt="Anjali">
    </div>

    <span class="eyebrow" id="eyebrow"></span>
    <h1 id="headline"></h1>
    <p class="sub" id="caption"></p>

    <div class="meter-label"><span>Cuteness Meter</span><span id="meterText">10%</span></div>
    <div class="meter-track"><div class="meter-fill" id="meterFill"></div></div>
  </div>

  <div class="nav-row">
    <!-- ✅ No inline onclick — event listeners added in script.js (required when using defer) -->
    <button id="backBtn" class="btn-secondary">← Back</button>
    <button id="nextBtn" class="btn-primary">Next →</button>
  </div>
</div>

<!-- ✅ defer: script runs after HTML is parsed, so all elements are available -->
<script src="script.js" defer></script>

</body>
</html>
