<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anjali ki River Diaries 🌊</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
    overflow: hidden;
    background: linear-gradient(135deg, var(--bg-pink) 0%, var(--bg-peach) 100%);
  }
  .splash-container {
    text-align: center;
    animation: popIn 0.8s cubic-bezier(0.22, 1, 0.36, 1);
  }
  h1 {
    font-family: 'Baloo 2', sans-serif;
    color: var(--text-dark);
    margin-bottom: 30px;
    font-size: clamp(28px, 6vw, 36px);
  }
  @keyframes popIn{
    from{ opacity:0; transform:translateY(10px) scale(0.97); }
    to{ opacity:1; transform:translateY(0) scale(1); }
  }
</style>
</head>
<body>

<div class="splash-container">
  <h1>Anjali ki River Diaries 🌊</h1>
  <button class="btn-primary" style="font-size: 18px; padding: 16px 32px; box-shadow: 0 15px 25px -10px rgba(255,79,129,0.7);" onclick="window.location.href='diary.html'">Tap to Open Diary 🌸</button>
</div>

</body>
</html>
